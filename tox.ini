# Tox configuration for multi-environment testing
[tox]
envlist = py38,py39,py310,py311,py312,security,coverage,docs
isolated_build = true

[testenv]
deps = 
    -r requirements.txt
    -r requirements-test.txt
commands =
    python -m grpc_tools.protoc --python_out=. --grpc_python_out=. --proto_path=. src/protocol/messages.proto
    pytest tests/ -v --cov=src --cov=server {posargs}

[testenv:security]
deps = 
    bandit
    safety
    semgrep
commands = 
    bandit -r src/ server/ --severity-level medium
    safety check
    # semgrep --config=auto src/ server/

[testenv:coverage]
deps = 
    -r requirements.txt
    -r requirements-test.txt
commands =
    python -m grpc_tools.protoc --python_out=. --grpc_python_out=. --proto_path=. src/protocol/messages.proto
    pytest tests/ --cov=src --cov=server --cov-report=html --cov-report=xml --cov-fail-under=80

[testenv:performance]
deps = 
    -r requirements.txt
    pytest-benchmark
commands =
    python -m grpc_tools.protoc --python_out=. --grpc_python_out=. --proto_path=. src/protocol/messages.proto
    pytest tests/ -m performance --benchmark-only

[testenv:docs]
deps = 
    sphinx
    sphinx-rtd-theme
    myst-parser
commands = 
    sphinx-build -b html docs/ docs/_build/html

[testenv:lint]
deps = 
    black
    isort
    flake8
    mypy
    pylint
commands = 
    black --check src/ server/ tests/
    isort --check-only src/ server/ tests/
    flake8 src/ server/ tests/
    mypy src/ server/ --ignore-missing-imports
    pylint src/ server/

[testenv:format]
deps = 
    black
    isort
commands = 
    black src/ server/ tests/
    isort src/ server/ tests/

[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    .tox,
    venv,
    .venv,
    build,
    dist,
    *.egg

[coverage:run]
source = src, server
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */.*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING: